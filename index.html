<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리그픽 - 낚시 툴박스</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230f172a%22/><text y=%22.82em%22 x=%225%22 font-size=%2275%22>🎣</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #020617; color: #fff; touch-action: manipulation; }
        .tab-btn { transition: all 0.3s; border-bottom: 3px solid transparent; opacity: 0.5; }
        .tab-btn.active { border-bottom: 3px solid #38bdf8; color: #38bdf8; opacity: 1; }
        .tool-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); display: none; }
        .tool-card.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        input, select { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: #fff; width: 100%; outline: none; }
        .ruler-line { position: absolute; bottom: 0; border-left: 1px solid #94a3b8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 pb-20">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black italic text-sky-400 tracking-tighter">RigPick</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Smart Fishing Tools</p>
        </header>

        <div class="flex justify-around mb-6 border-b border-slate-800">
            <button onclick="openTab('reel')" id="btn-reel" class="tab-btn pb-3 font-bold text-sm active">릴 계산</button>
            <button onclick="openTab('weight')" id="btn-weight" class="tab-btn pb-3 font-bold text-sm">무게 변환</button>
            <button onclick="openTab('ruler')" id="btn-ruler" class="tab-btn pb-3 font-bold text-sm">디지털 자</button>
        </div>

        <div id="tab-reel" class="tool-card active p-6">
            <h3 class="font-black mb-4 text-sky-300 text-sm italic">🧶 라인 감기 계산기</h3>
            <div class="space-y-4 text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block mb-1 text-[10px] text-slate-400">스풀 기준 호수</label>
                        <input type="number" id="baseLine" value="2.0" class="text-center">
                    </div>
                    <div>
                        <label class="block mb-1 text-[10px] text-slate-400">스풀 기준 길이(m)</label>
                        <input type="number" id="baseMeter" value="150" class="text-center">
                    </div>
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-slate-400">내가 감을 호수 (입력 시 자동계산)</label>
                    <input type="number" id="targetLine" placeholder="1.2" oninput="calcReel()" class="text-center border-sky-500/50">
                </div>
                <div class="bg-slate-900/80 p-5 rounded-2xl text-center border border-sky-500/20">
                    <p class="text-[10px] text-slate-500 mb-1 uppercase font-bold">Estimated Length</p>
                    <span id="reelResult" class="text-4xl font-black text-sky-400">250</span><span class="text-sky-400 ml-1 font-bold">m</span>
                </div>
            </div>
        </div>

        <div id="tab-weight" class="tool-card p-6">
            <h3 class="font-black mb-4 text-emerald-400 text-sm italic">⚖️ 무게 단위 변환</h3>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">호 (찌/봉돌)</label>
                    <input type="number" id="in-ho" placeholder="1.0" oninput="convWeight('ho')" class="text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">그램 (g)</label>
                    <input type="number" id="in-g" placeholder="3.75" oninput="convWeight('g')" class="text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">온스 (oz)</label>
                    <input type="number" id="in-oz" placeholder="0.13" oninput="convWeight('oz')" class="text-center">
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1 font-bold">B (찌낚시 단위)</label>
                    <input type="number" id="in-b" placeholder="6.8" oninput="convWeight('b')" class="text-center">
                </div>
            </div>
            <p class="text-[9px] text-slate-500 mt-4 text-center italic">*표준 환산치 기준이며 제조사별 미세오차가 있습니다.</p>
        </div>

        <div id="tab-ruler" class="tool-card p-6 relative overflow-hidden" style="height: 380px;">
            <h3 class="font-black mb-1 text-rose-400 text-sm italic">📏 포켓 자 (20cm)</h3>
            <p class="text-[9px] text-slate-500 mb-4">*화면 배율에 따라 실제와 다를 수 있음</p>
            <div class="relative w-full h-48 bg-slate-100 rounded-2xl overflow-hidden border-4 border-slate-800" id="rulerBody">
                </div>
            <div class="mt-4 text-center text-[10px] text-slate-400 font-bold uppercase tracking-tighter animate-pulse">
                Swipe to Measure
            </div>
        </div>

        <div class="mt-8 space-y-4">
            <div class="bg-[#1e293b] border border-slate-700 rounded-2xl p-4 shadow-2xl">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-[10px] bg-red-500 text-white px-2 py-0.5 rounded font-black uppercase">Coupang</span>
                    <span class="text-[10px] text-slate-400 font-bold">최저가 낚시용품 검색</span>
                </div>
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="필요한 소모품을 입력하세요" class="flex-grow p-3 border border-slate-800 rounded-xl text-sm bg-[#020617] text-white outline-none focus:border-sky-500 transition">
                    <button type="submit" class="bg-sky-500 px-5 rounded-xl font-black text-xs text-white active:scale-95 transition">검색</button>
                </form>
            </div>

            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-3 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                찬둥에게 커피 후원하기
            </a>
            
            <p class="text-[9px] text-center text-slate-600 font-bold uppercase tracking-widest">Powered by RigPick Toolbox</p>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            document.querySelectorAll('.tool-card').forEach(card => card.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
            if(tabName === 'ruler') drawRuler();
        }

        // 릴 계산 (표준 권사량 비례식)
        function calcReel() {
            const bL = parseFloat(document.getElementById('baseLine').value);
            const bM = parseFloat(document.getElementById('baseMeter').value);
            const tL = parseFloat(document.getElementById('targetLine').value);
            if(bL && bM && tL) {
                // 단면적 비례: (기준호수^2 / 대상호수^2) * 기준길이
                const result = Math.floor((Math.pow(bL, 2) / Math.pow(tL, 2)) * bM);
                document.getElementById('reelResult').innerText = result;
            }
        }

        // 무게 변환 (상호 환산)
        function convWeight(type) {
            const ho = document.getElementById('in-ho');
            const g = document.getElementById('in-g');
            const oz = document.getElementById('in-oz');
            const b = document.getElementById('in-b');

            if(type === 'ho') {
                g.value = (ho.value * 3.75).toFixed(2);
                oz.value = (g.value / 28.35).toFixed(2);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'g') {
                ho.value = (g.value / 3.75).toFixed(1);
                oz.value = (g.value / 28.35).toFixed(2);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'oz') {
                g.value = (oz.value * 28.35).toFixed(2);
                ho.value = (g.value / 3.75).toFixed(1);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'b') {
                g.value = (b.value * 0.55).toFixed(2);
                ho.value = (g.value / 3.75).toFixed(1);
                oz.value = (g.value / 28.35).toFixed(2);
            }
        }

        // 디지털 자 (1mm = 약 3.78px)
        function drawRuler() {
            const ruler = document.getElementById('rulerBody');
            ruler.innerHTML = '';
            for(let i=0; i<=200; i++) {
                const line = document.createElement('div');
                line.className = 'ruler-line';
                line.style.left = (i * 3.78) + 'px';
                if(i % 10 === 0) {
                    line.style.height = '40px';
                    line.style.borderLeft = '2px solid #334155';
                    const txt = document.createElement('span');
                    txt.innerText = i/10;
                    txt.style.position = 'absolute';
                    txt.style.top = '-25px';
                    txt.style.left = '-4px';
                    txt.style.fontSize = '12px';
                    txt.style.fontWeight = 'bold';
                    txt.style.color = '#1e293b';
                    line.appendChild(txt);
                } else if(i % 5 === 0) {
                    line.style.height = '25px';
                } else {
                    line.style.height = '15px';
                    line.style.opacity = '0.3';
                }
                ruler.appendChild(line);
            }
        }

        window.onload = () => { calcReel(); };
    </script>
</body>
</html>
