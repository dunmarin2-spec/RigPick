<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>리그픽 - 초정밀 툴박스</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23020617%22/><text y=%22.82em%22 x=%225%22 font-size=%2275%22>🎣</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #020617; color: #fff; touch-action: none; }
        .tool-card { background: rgba(30, 41, 59, 0.4); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); display: none; }
        .tool-card.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        .ruler-container { position: relative; width: 100%; height: 160px; background: #f8fafc; border-radius: 16px; overflow: hidden; }
        .ruler-line { position: absolute; bottom: 0; border-left: 1px solid #1e293b; pointer-events: none; }
        .tab-btn { opacity: 0.4; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid #38bdf8; color: #38bdf8; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        input { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 10px; color: #fff; width: 100%; outline: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body class="p-4 pb-28">
    <div class="max-w-md mx-auto">
        <header class="text-center py-4">
            <h1 class="text-4xl font-black italic text-sky-400 tracking-tighter">RigPick</h1>
            <p class="text-[10px] text-emerald-400 font-bold uppercase mt-1 tracking-widest text-center">Ultimate Fishing Toolkit</p>
        </header>

        <div class="flex justify-around mb-6 border-b border-slate-800">
            <button onclick="openTab('ruler')" id="btn-ruler" class="tab-btn pb-3 font-bold text-xs active">디지털 자</button>
            <button onclick="openTab('reel')" id="btn-reel" class="tab-btn pb-3 font-bold text-xs">릴 권사량</button>
            <button onclick="openTab('weight')" id="btn-weight" class="tab-btn pb-3 font-bold text-xs">무게 변환</button>
        </div>

        <div id="tab-ruler" class="tool-card active p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-rose-400 text-sm italic">📏 보정형 디지털 자</h3>
                <div class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <button onclick="adjustRuler(-0.01)" class="text-white font-bold px-2">-</button>
                    <span class="text-[11px] text-sky-400 font-mono font-bold" id="zoomVal">1.00</span>
                    <button onclick="adjustRuler(0.01)" class="text-white font-bold px-2">+</button>
                </div>
            </div>
            <div class="ruler-container shadow-2xl mb-4" id="rulerBody"></div>
            <div class="bg-slate-900/80 p-3 rounded-xl border border-slate-700">
                <p class="text-[10px] text-slate-300 leading-relaxed text-center">
                    💡 <span class="text-emerald-400 font-bold">카드(짧은 면: 5.4cm)</span>를 대고 <span class="text-white font-bold">+/-</span>로 눈금을 맞추세요.
                </p>
            </div>
        </div>

        <div id="tab-reel" class="tool-card p-6">
            <h3 class="text-sky-400 font-bold text-[11px] mb-4 uppercase italic">🧶 라인 권사량 계산</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block mb-1 text-[9px] text-slate-500 uppercase font-bold text-center">스풀 기준 호수</label>
                        <input type="number" id="baseLine" value="2.0">
                    </div>
                    <div>
                        <label class="block mb-1 text-[9px] text-slate-500 uppercase font-bold text-center">스풀 기준 길이(m)</label>
                        <input type="number" id="baseMeter" value="150">
                    </div>
                </div>
                <div>
                    <label class="block mb-1 text-[10px] text-sky-400 font-bold text-center">새로 감을 호수 입력</label>
                    <input type="number" id="targetLine" oninput="calcReel()" placeholder="예: 1.2" class="border-sky-500/50">
                </div>
                <div class="bg-slate-900 p-4 rounded-xl text-center border border-slate-800">
                    <p class="text-[9px] text-slate-500 mb-1 font-bold">EXPECTED LENGTH</p>
                    <span id="reelResult" class="text-3xl font-black text-sky-400">250</span><span class="text-sky-400 ml-1 font-bold">m</span>
                </div>
            </div>
        </div>

        <div id="tab-weight" class="tool-card p-6">
            <h3 class="text-emerald-400 font-bold text-[11px] mb-4 uppercase italic">⚖️ 봉돌/지그헤드 무게 변환</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[9px] text-slate-500 mb-1 font-bold text-center uppercase">호 (찌/봉돌)</label>
                    <input type="number" id="in-ho" placeholder="1.0" oninput="convWeight('ho')">
                </div>
                <div>
                    <label class="block text-[9px] text-slate-500 mb-1 font-bold text-center uppercase">그램 (g)</label>
                    <input type="number" id="in-g" placeholder="3.75" oninput="convWeight('g')">
                </div>
                <div>
                    <label class="block text-[9px] text-slate-500 mb-1 font-bold text-center uppercase">온스 (oz)</label>
                    <input type="number" id="in-oz" placeholder="0.13" oninput="convWeight('oz')">
                </div>
                <div>
                    <label class="block text-[9px] text-slate-500 mb-1 font-bold text-center uppercase">B (찌낚시)</label>
                    <input type="number" id="in-b" placeholder="6.8" oninput="convWeight('b')">
                </div>
            </div>
            <p class="text-[9px] text-slate-600 mt-4 text-center italic">단위별 표준 환산치를 적용한 결과입니다.</p>
        </div>

        <div class="mt-8 space-y-4">
            <div class="bg-slate-800/90 p-4 rounded-2xl border border-slate-700 shadow-2xl">
                <form action="https://www.coupang.com/np/search" method="get" target="_blank" class="flex gap-2">
                    <input type="hidden" name="channel" value="AF4757238">
                    <input type="text" name="q" placeholder="낚시용품 검색 (ID: AF4757238)" class="flex-grow bg-slate-950 p-3 rounded-xl text-xs outline-none border border-slate-700 focus:border-sky-500 transition-all">
                    <button type="submit" class="bg-sky-500 px-5 rounded-xl font-black text-xs">검색</button>
                </form>
            </div>
            <a href="https://qr.kakaopay.com/FRK8J0SAD" target="_blank" class="flex items-center justify-center gap-3 bg-[#FAE100] text-[#3C1E1E] py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">☕ 찬둥 커피 후원 (FRK8J0SAD)</a>
        </div>
    </div>

    <script>
        let ppiScale = parseFloat(localStorage.getItem('rigpick_scale')) || 1.0;

        function openTab(name) {
            document.querySelectorAll('.tool-card').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).style.display = 'block';
            document.getElementById('btn-' + name).classList.add('active');
            if(name === 'ruler') drawRuler();
        }

        function adjustRuler(val) {
            ppiScale = Math.max(0.5, Math.min(2.0, parseFloat((ppiScale + val).toFixed(2))));
            localStorage.setItem('rigpick_scale', ppiScale);
            document.getElementById('zoomVal').innerText = ppiScale.toFixed(2);
            drawRuler();
        }

        function drawRuler() {
            const ruler = document.getElementById('rulerBody');
            ruler.innerHTML = '';
            document.getElementById('zoomVal').innerText = ppiScale.toFixed(2);
            const mmPx = 3.7795 * ppiScale; 
            for(let i=0; i<=150; i++) {
                const line = document.createElement('div');
                line.className = 'ruler-line';
                line.style.left = (i * mmPx) + 'px';
                if(i % 10 === 0) {
                    line.style.height = '45px';
                    line.style.borderLeft = '2px solid #1e293b';
                    const txt = document.createElement('span');
                    txt.innerText = i/10;
                    txt.style.position = 'absolute';
                    txt.style.top = '-28px';
                    txt.style.left = '-4px';
                    txt.style.fontSize = '14px';
                    txt.style.fontWeight = '900';
                    txt.style.color = '#1e293b';
                    line.appendChild(txt);
                } else if(i % 5 === 0) {
                    line.style.height = '25px';
                } else {
                    line.style.height = '12px';
                    line.style.opacity = '0.3';
                }
                ruler.appendChild(line);
            }
        }

        function calcReel() {
            const bL = parseFloat(document.getElementById('baseLine').value);
            const bM = parseFloat(document.getElementById('baseMeter').value);
            const tL = parseFloat(document.getElementById('targetLine').value);
            if(bL && bM && tL) {
                const res = Math.floor((Math.pow(bL, 2) / Math.pow(tL, 2)) * bM);
                document.getElementById('reelResult').innerText = res;
            }
        }

        function convWeight(type) {
            const ho = document.getElementById('in-ho');
            const g = document.getElementById('in-g');
            const oz = document.getElementById('in-oz');
            const b = document.getElementById('in-b');
            if(type === 'ho') {
                g.value = (ho.value * 3.75).toFixed(2);
                oz.value = (g.value / 28.35).toFixed(2);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'g') {
                ho.value = (g.value / 3.75).toFixed(1);
                oz.value = (g.value / 28.35).toFixed(2);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'oz') {
                g.value = (oz.value * 28.35).toFixed(2);
                ho.value = (g.value / 3.75).toFixed(1);
                b.value = (g.value / 0.55).toFixed(1);
            } else if(type === 'b') {
                g.value = (b.value * 0.55).toFixed(2);
                ho.value = (g.value / 3.75).toFixed(1);
                oz.value = (g.value / 28.35).toFixed(2);
            }
        }

        window.onload = () => { drawRuler(); calcReel(); };
    </script>
</body>
</html>
